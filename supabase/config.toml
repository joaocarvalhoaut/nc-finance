# Supabase CLI configuration
# Substitua <PROJECT_REF> pelo ID real do seu projeto Supabase.
# Exemplo: project_id = "abcdefghijklmnop"
# Encontre em: https://supabase.com/dashboard/project/<PROJECT_REF>/settings/general

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[api.tls]
enabled = false

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = false
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[realtime]
enabled = true

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"
openai_api_key = "env(OPENAI_API_KEY)"

[inbucket]
enabled = true
port = 54324
smtp_port = 54325
pop3_port = 54326

[storage]
enabled = true
file_size_limit = "50MiB"

[storage.image_transformation]
enabled = true

[auth]
enabled = true
site_url = "http://127.0.0.1:5173"
additional_redirect_urls = [
  "http://localhost:5173",
  "http://127.0.0.1:5173"
]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false
enable_manual_linking = false
minimum_password_length = 6
password_requirements = ""

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false
secure_password_change = false
max_frequency = "1s"
otp_length = 6
otp_expiry = 3600

[auth.sms]
enable_signup = false
enable_confirmations = false
template = "Your code is {{ .Code }}"

[auth.mfa]
max_enrolled_factors = 10

[auth.mfa.totp]
enroll_enabled = false
verify_enabled = false

[auth.mfa.phone]
enroll_enabled = false
verify_enabled = false
otp_length = 6
template = "Your code is {{ .Code }}"
max_frequency = "5s"

[edge_runtime]
enabled = true
policy = "oneshot"
inspector_port = 8083

[functions.stripe-webhook]
verify_jwt = false

[functions.run-automation-scheduler]
verify_jwt = false

[functions.process-dispatch-jobs]
verify_jwt = false

# Z-API sends webhooks without Supabase JWT — auth is via Client-Token header
[functions.sync-whatsapp-status]
verify_jwt = false

# Auto-continuação em background se re-invoca com AUTOMATION_CRON_SECRET.
# A função valida auth internamente (getUser p/ usuário, cron-secret p/ "continue").
[functions.drive-index-folder]
verify_jwt = false

[analytics]
enabled = false
port = 54327
backend = "postgres"
